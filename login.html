<!doctype html>
<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | AuraMed Smart Systems</title>
    <!-- Google Fonts: Hanken Grotesk & Source Serif 4 -->
    <link href="https://fonts.googleapis.com" rel="preconnect" />
    <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect" />
    <link
      href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600&amp;family=Source+Serif+4:opsz,wght@8..60,600&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="assets/js/login.config.js"></script>
    <link rel="stylesheet" href="assets/css/login.css" />
    
  </head>
  <body
    class="bg-surface font-body-md text-on-surface min-h-screen flex flex-col relative overflow-hidden"
  >
    <header
      class="fixed top-0 left-0 w-full z-50 bg-surface/95 backdrop-blur-sm border-b border-secondary-container"
    >
      <div
        class="max-w-container-max mx-auto h-20 px-margin-mobile md:px-margin-desktop flex items-center justify-between gap-4"
      >
        <a
          class="shrink-0 flex items-center"
          href="home.html"
          aria-label="AuraMed Home"
          ><img src="assets/logo.svg" alt="AuraMed" class="h-10 w-auto"
        /></a>
        <nav class="hidden md:flex items-center gap-8">
          <a
            class="text-secondary hover:text-primary transition-colors duration-250 pb-1 border-b-2 border-transparent font-label-md text-label-md"
            href="home.html"
            >Home</a
          >
          <a
            class="text-secondary hover:text-primary transition-colors duration-250 pb-1 border-b-2 border-transparent font-label-md text-label-md"
            href="products.html"
            >Products &amp; Bundles</a
          >
          <a
            class="text-secondary hover:text-primary transition-colors duration-250 pb-1 border-b-2 border-transparent font-label-md text-label-md"
            href="schedule.html"
            >Schedule</a
          >
          <a
            class="text-secondary hover:text-primary transition-colors duration-250 pb-1 border-b-2 border-transparent font-label-md text-label-md"
            href="profile.html"
            >Profile</a
          >
        </nav>
        <div class="flex items-center gap-4 md:gap-5">
          <a
            aria-label="View cart"
            class="text-on-surface-variant hover:text-primary transition-colors duration-250"
            href="cart.html"
          >
            <span class="material-symbols-outlined">shopping_cart</span>
          </a>
          <a
            class="hidden md:inline-block font-label-md text-label-md text-secondary hover:text-primary transition-colors duration-250"
            href="login.html"
            >Log In</a
          >
          <a
            class="hidden md:inline-flex items-center justify-center bg-primary-container text-white px-5 h-10 rounded-lg font-label-md text-label-md hover:opacity-90 active:scale-[0.98] transition-all duration-250"
            href="signup.html"
            >Sign Up</a
          >
          <button
            aria-controls="mobile-menu"
            aria-expanded="false"
            aria-label="Toggle menu"
            class="md:hidden text-on-surface flex items-center justify-center"
            id="mobile-menu-btn"
            type="button"
          >
            <span class="material-symbols-outlined" id="mobile-menu-icon"
              >menu</span
            >
          </button>
        </div>
      </div>
      <div
        class="md:hidden hidden flex-col bg-surface border-t border-secondary-container px-margin-mobile"
        id="mobile-menu"
      >
        <a
          class="text-on-surface font-label-md text-label-md py-3 border-b border-secondary-container"
          href="home.html"
          >Home</a
        >
        <a
          class="text-on-surface font-label-md text-label-md py-3 border-b border-secondary-container"
          href="products.html"
          >Products &amp; Bundles</a
        >
        <a
          class="text-on-surface font-label-md text-label-md py-3 border-b border-secondary-container"
          href="schedule.html"
          >Schedule</a
        >
        <a
          class="text-on-surface font-label-md text-label-md py-3 border-b border-secondary-container"
          href="profile.html"
          >Profile</a
        >
        <div class="flex items-center gap-4 py-4">
          <a
            class="font-label-md text-label-md text-secondary"
            href="login.html"
            >Log In</a
          >
          <a
            class="bg-primary-container text-white px-5 py-2 rounded-lg font-label-md text-label-md"
            href="signup.html"
            >Sign Up</a
          >
        </div>
      </div>
    </header>
    <div
      aria-hidden="true"
      class="md:hidden"
      id="mobile-menu-spacer"
      style="height: 0px; overflow: hidden; transition: height 300ms ease"
    ></div>
    <!-- Atmospheric Shader -->
    <div class="absolute inset-0 z-0 opacity-40 pointer-events-none">
      <div
        class="absolute inset-0 bg-[radial-gradient(circle_at_50%_-20%,_var(--tw-gradient-from),_transparent_60%)] from-primary-fixed-dim/20"
      ></div>
    </div>
    <!-- Main Content – Centered -->
    <main
      class="flex-grow flex items-center justify-center relative z-10 px-margin-mobile md:px-margin-desktop py-12 pt-32"
    >
      <div class="w-full max-w-[440px] flex flex-col items-center">
        <!-- Brand Anchor -->
        <div class="mb-10 text-center">
          <img
            src="assets/logo.svg"
            alt="AuraMed"
            class="h-16 w-auto mx-auto mb-2"
          />
          <p class="font-body-md text-secondary max-w-[300px] mx-auto">
            Precision medical care through reliable sophistication.
          </p>
        </div>
        <!-- Login Card -->
        <div class="login-card w-full rounded-2xl p-8 md:p-10 ambient-shadow">
          <h2 class="font-headline-md text-headline-md text-on-surface mb-8">
            Sign In
          </h2>
          <form
            action="/auth/login.php"
            class="space-y-6"
            id="loginForm"
            method="POST"
            novalidate
          >
            <!-- Email Field -->
            <div class="space-y-1">
              <label
                class="block font-label-md text-label-md text-on-surface-variant mb-2"
                for="email"
                >Email Address</label
              >
              <div class="relative group">
                <span
                  class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-1"
                  >mail</span
                >
                <input
                  class="custom-input w-full bg-transparent border-t-0 border-x-0 border-b border-secondary-container py-3 pl-9 pr-2 font-body-md text-on-surface placeholder:text-secondary-fixed-dim transition-slow"
                  id="email"
                  name="email"
                  placeholder="name@example.com"
                  type="email"
                />
              </div>
              <div
                class="errors font-label-sm text-label-sm text-error min-h-[16px]"
                id="email_error"
              ></div>
            </div>
            <!-- Password Field with improved forgot link -->
            <div class="space-y-1">
              <div class="flex justify-between items-center mb-1">
                <label
                  class="block font-label-md text-label-md text-on-surface-variant"
                  for="password"
                  >Password</label
                >
                
              </div>
              <div class="relative group password-wrapper">
                <span
                  class="material-symbols-outlined absolute left-0 top-1/2 -translate-y-1/2 text-outline px-1"
                  >lock</span
                >
                <input
                  class="custom-input w-full bg-transparent border-t-0 border-x-0 border-b border-secondary-container py-3 pl-9 pr-10 font-body-md text-on-surface transition-slow"
                  id="password"
                  name="password"
                  type="password"
                  placeholder="••••••••"
                />
                <button
                  class="toggle-password absolute right-0 top-1/2 -translate-y-1/2 text-outline hover:text-on-surface transition-slow px-1"
                  type="button"
                  aria-label="Toggle password visibility"
                  id="togglePasswordBtn"
                >
                  <span class="material-symbols-outlined">visibility</span>
                </button>
              </div>
              <div
                class="errors font-label-sm text-label-sm text-error min-h-[16px]"
                id="pass_error"
              ></div>
            </div>
            <a
                  class="forgot-link font-label-sm text-label-sm"
                  href="#"
                  aria-label="Reset your password"
                >
                  <span class="material-symbols-outlined">help_outline</span>
                  <span>Forgot?</span>
                </a>
            <!-- CTA Button -->
            <div class="pt-4">
              <button
                class="w-full block text-center bg-[#340D1A] text-white font-label-md text-label-md py-4 rounded-lg hover:opacity-90 active:scale-[0.98] transition-slow shadow-lg shadow-primary-container/10"
                type="submit"
                id="loginButton"
              >
                Log In
              </button>
            </div>
          </form>
          <!-- Divider (optional, kept minimal) -->
        </div>
        <!-- Footer Link -->
        <p class="mt-8 font-body-md text-secondary text-center">
          Don't have an account?
          <a
            class="text-primary font-semibold hover:underline decoration-primary-fixed-dim transition-slow"
            href="signup.html"
            >Sign Up Now</a
          >
        </p>
      </div>
      <h1>alii</h1>
    </main>
    <!-- Micro-interaction Script -->
    <script src="assets/js/auth-store.js"></script>
    <script src="assets/js/nav-auth.js"></script>
    <script src="assets/js/login.js"></script>
  </body>
</html>
